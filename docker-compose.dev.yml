# ============================================================================
# Lightweight dev compose — only runs Redis.
# Qdrant uses Qdrant Cloud free tier (no local container needed).
#
# Usage: docker compose -f docker-compose.dev.yml up -d
# RAM impact: ~30MB for Redis
# ============================================================================

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  redis_dev_data:
